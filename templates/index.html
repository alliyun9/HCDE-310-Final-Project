{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-6 text-center">

        <h1 class="mb-4">Search for Drug Information</h1>

        {% if error %}
        <div class="alert alert-warning">
            {{ error }}
        </div>
        {% endif %}

        <form action="/results" method="post">
            <div class="mb-3">
                <input type="text" name="drug_name" id="drug_name" class="form-control" placeholder="ex: ibuprofen" required>
            </div>
            <button type="submit" class="btn btn-primary">Search</button>
        </form>

    </div>
</div>

{% endblock %}
